name: Album Notifier

on:
  schedule:
    # Default: Mon-Fri at 8am US Eastern (12:00 UTC)
    # Note: GitHub Actions uses UTC. Your notification time will shift
    # by 1 hour when Daylight Saving Time changes. See README for details.
    # Include weekends: '0 12 * * *'
    # Common times (Mon-Fri):
    #   9am US Eastern = '0 13 * * 1-5'
    #   8am US Pacific = '0 15 * * 1-5'
    #   9am UK         = '0 9 * * 1-5'
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: Run Notifier
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          API_URL: ${{ secrets.API_URL }}
        run: uv run python notify.py
